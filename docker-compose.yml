services:
  clazy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: upl-scroller-clazy
    volumes:
      - .:/work
    working_dir: /work
    environment:
      - CLAZY_CHECKS=non-pod-global-static
    command: >
      bash -c "
        mkdir -p build-clazy && cd build-clazy &&
        cmake .. -DCMAKE_CXX_COMPILER=clazy &&
        make &&
        echo '' &&
        echo 'Clazy analysis complete!'
      "

  cross-compile:
    build:
      context: .
      dockerfile: Dockerfile.cross
    container_name: upl-scroller-cross-compile
    volumes:
      - .:/work
    working_dir: /work
    command: >
      bash -c "
        mkdir -p build-arm && cd build-arm &&
        PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig cmake .. -DCMAKE_TOOLCHAIN_FILE=../toolchain-arm.cmake &&
        make &&
        echo '' &&
        echo 'Build complete! ARM binary: ./upl_scroller' &&
        echo 'Copy to Pi: scp upl_scroller pi@YOUR_PI_IP:/home/pi/'
      "
